# ============================================================
# 西联智能平台 Helm Values — 单体部署架构（v4.1）
# ============================================================
# 审计修复: 代码是单体应用，Helm 应匹配为 1 Deployment + HPA
# 原 7 微服务模板已移除，改为统一的 app 部署
# ============================================================

# ── 全局配置 ──
global:
  namespace: xilian
  # FIX-109: hostname 集中定义，ingress/tls 引用此变量
  hostname: platform.xilian.io
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  environment: production
  logLevel: info
  tracingEnabled: true
  otlpEndpoint: "http://jaeger:4318"

# ============================================================
# 应用层 — 单体部署（1 Deployment + HPA + PDB）
# ============================================================
app:
  replicaCount: 2
  image:
    repository: xilian-platform/app
    tag: "4.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  env:
    NODE_ENV: production
    PORT: "3000"
    LOG_LEVEL: info
    CIRCUIT_BREAKER_ENABLED: "true"
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_GLOBAL: "300"
    RATE_LIMIT_API: "100"
    OTEL_ENABLED: "true"
    OTEL_SERVICE_NAME: "xilian-platform"
  envFromSecret:
    - name: JWT_SECRET
      secretName: xilian-secrets
      key: jwt-secret
    - name: REDIS_URL
      secretName: xilian-secrets
      key: redis-url
    - name: DATABASE_URL
      secretName: xilian-secrets
      key: mysql-url
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthz/ready
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 120
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
      nginx.ingress.kubernetes.io/websocket-services: xilian-app
    hosts:
      - host: ""  # FIX-109: 由模板自动填充 global.hostname
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: xilian-tls
        hosts: []  # FIX-109: 由模板自动填充 global.hostname
  nodeSelector: {}
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - app
            topologyKey: kubernetes.io/hostname
  tolerations: []

# ── 边缘服务（独立部署，默认关闭）──
edge:
  gateway:
    enabled: false
  inference:
    enabled: false
  tsn:
    enabled: false

# ============================================================
# 微服务拆分（默认关闭，Strangler Fig 渐进式拆分）
# 启用后独立部署各域服务，单体自动降级
# healthPort: 若设置，使用 HTTP 健康检查（适用于带 HTTP health 端点的服务）
# ============================================================
microservices:
  enabled: false  # true = 启用微服务模式
  # ── 配置中心（HTTP 服务，独立管理全局配置） ──
  configCenter:
    enabled: false
    image:
      repository: xilian/config-center
      tag: latest
    replicas: 2
    port: 8900        # HTTP 主端口
    healthPort: 8900   # HTTP 健康检查端口
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      DEPLOYMENT_MODE: microservices
      CONFIG_CENTER_PORT: "8900"
  # ── 设备服务（gRPC） ──
  device:
    enabled: false
    image:
      repository: xilian/device-service
      tag: latest
    replicas: 2
    port: 50051
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env:
      DEPLOYMENT_MODE: microservices
      DEVICE_SERVICE_PORT: "50051"
  # ── 算法服务（gRPC + HTTP health） ──
  algorithm:
    enabled: false
    image:
      repository: xilian/algorithm-service
      tag: latest
    replicas: 2
    port: 50052        # gRPC 主端口
    healthPort: 3080   # HTTP 健康检查端口
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    env:
      DEPLOYMENT_MODE: microservices
      ALGORITHM_SERVICE_PORT: "50052"
      ALGORITHM_HEALTH_PORT: "3080"
      WORKER_POOL_SIZE: "4"
  # ── AI 推理服务（gRPC + HTTP health） ──
  aiInference:
    enabled: false
    image:
      repository: xilian/ai-inference
      tag: latest
    replicas: 2
    port: 50057        # gRPC 主端口
    healthPort: 3090   # HTTP 健康检查端口
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    env:
      DEPLOYMENT_MODE: microservices
      AI_INFERENCE_PORT: "50057"
      AI_HEALTH_PORT: "3090"
  # ── 诊断服务（gRPC + HTTP health） ──
  diagnosis:
    enabled: false
    image:
      repository: xilian/diagnosis-service
      tag: latest
    replicas: 2
    port: 50058        # gRPC 主端口
    healthPort: 3095   # HTTP 健康检查端口
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    env:
      DEPLOYMENT_MODE: microservices
      DIAGNOSIS_SERVICE_PORT: "50058"
      DIAGNOSIS_HEALTH_PORT: "3095"

# ============================================================
# 可观测性
# ============================================================

observability:
  prometheus:
    enabled: true
    scrapeInterval: 15s
    serviceMonitor:
      enabled: true
  jaeger:
    enabled: true
    image:
      repository: jaegertracing/all-in-one
      tag: "1.53"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
    storage:
      type: elasticsearch
    collector:
      otlp:
        enabled: true
  grafana:
    enabled: true
    adminPassword: ""
    dashboardProviders:
      enabled: true
  loki:
    enabled: true
  alertmanager:
    enabled: true
    config:
      inhibitRules:
        # 审核意见6 优化4: Alertmanager 抑制链
        - sourceMatch:
            severity: critical
          targetMatch:
            severity: warning
          equal: ['service', 'alertname']

# ── 安全 ──
security:
  falco:
    enabled: true
  vault:
    enabled: false
  networkPolicy:
    enabled: true
    allowIngressFromSameNamespace: true
    allowPrometheusIngress: true
  podSecurityPolicy:
    enabled: false

# ── AI / xAI Grok ──
ai:
  grok:
    enabled: false
    apiUrl: https://api.x.ai
    # apiKey 通过 Vault 或 K8s Secret 注入，不在 values 中硬编码
    apiKeySecret: xilian-xai-secret
    apiKeySecretKey: XAI_API_KEY
    model: grok-4-0709
    timeout: 60000
    temperature: 0.2
    fallbackToOllama: true
    maxTokens: 8192

# ============================================================
# 基础设施依赖 — Bitnami 子 Chart
# ============================================================

mysql:
  enabled: true
  auth:
    rootPassword: ""
    database: xilian_platform
    username: xilian
    password: ""
  primary:
    persistence:
      size: 50Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

kafka:
  enabled: true
  kraft:
    enabled: true
  replicaCount: 3
  listeners:
    client:
      protocol: PLAINTEXT
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

clickhouse:
  enabled: true
  auth:
    username: xilian
    password: ""
    database: xilian_ts
  shards: 1
  replicaCount: 1
  persistence:
    size: 100Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 8Gi

elasticsearch:
  enabled: true
  master:
    replicaCount: 1
  data:
    replicaCount: 1
  coordinating:
    replicaCount: 0
  ingest:
    replicaCount: 0

minio:
  enabled: true
  auth:
    rootUser: ""
    rootPassword: ""
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

# ============================================================
# ServiceAccount & RBAC
# ============================================================

serviceAccount:
  create: true
  name: xilian-platform
  annotations: {}

rbac:
  create: true

# ============================================================
# Secrets — 部署时通过 --set 或 values 文件覆盖
# ============================================================
secrets:
  mysqlUrl: ""
  redisUrl: ""
  jwtSecret: ""
  kafkaBrokers: ""
  clickhouseUrl: ""
  minioAccessKey: ""
  minioSecretKey: ""
  neo4jPassword: ""
  elasticsearchPassword: ""
  xaiApiKey: ""

# ============================================================
# ConfigMap — 应用配置（非敏感项，支持热更新）
# ============================================================
configMap:
  enabled: true
  data:
    # 平台运行参数
    CIRCUIT_BREAKER_ENABLED: "true"
    CIRCUIT_BREAKER_TIMEOUT: "120000"
    CIRCUIT_BREAKER_ERROR_THRESHOLD: "50"
    CIRCUIT_BREAKER_RESET_TIMEOUT: "60000"
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_GLOBAL: "300"
    RATE_LIMIT_API: "100"
    # FIX-110: gRPC 服务使用 K8s service DNS
    DEPLOYMENT_MODE: "monolith"
    ALGORITHM_SERVICE_HOST: "xilian-algorithm-service"
    DEVICE_SERVICE_HOST: "xilian-device-service"
    # 可观测性
    OTEL_ENABLED: "true"
    OTEL_SERVICE_NAME: "xilian-platform"
    PROMETHEUS_ENABLED: "true"
    # 感知层
    PERCEPTION_RING_BUFFER_SIZE: "4096"
    PERCEPTION_BPA_WINDOW_SEC: "60"
    # 认知层
    COGNITION_DS_CONFLICT_THRESHOLD: "0.3"
    COGNITION_PHYSICS_VALIDATION: "true"
    # 进化层
    EVOLUTION_SHADOW_ENABLED: "false"
    EVOLUTION_CHAMPION_CHALLENGER: "false"
    # 联邦蒸馏
    FEDERATED_MIN_CONTRIBUTORS: "2"
    FEDERATED_MAX_PACKAGE_SIZE_MB: "50"
