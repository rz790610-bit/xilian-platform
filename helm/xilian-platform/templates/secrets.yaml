{{/* [FIX-106] 必填密码字段校验 — helm template 不填密码时报错 */}}
{{- if and (ne .Values.global.environment "development") (not .Values.secrets.jwtSecret) }}
  {{- fail "secrets.jwtSecret is required for non-development environments. Set via --set secrets.jwtSecret=<value>" }}
{{- end }}
{{- if and (ne .Values.global.environment "development") (not .Values.secrets.mysqlUrl) }}
  {{- fail "secrets.mysqlUrl is required for non-development environments. Set via --set secrets.mysqlUrl=<value>" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: xilian-secrets
  namespace: {{ include "xilian.namespace" . }}
  labels:
    {{- include "xilian.labels" . | nindent 4 }}
type: Opaque
data:
  # 通过 --set secrets.mysqlUrl=<base64> 或 values 文件覆盖
  # 生产环境建议使用 Vault 注入，此处仅做占位
  mysql-url: {{ .Values.secrets.mysqlUrl | default "" | b64enc | quote }}
  redis-url: {{ .Values.secrets.redisUrl | default "" | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | default "" | b64enc | quote }}
  kafka-brokers: {{ .Values.secrets.kafkaBrokers | default "" | b64enc | quote }}
  clickhouse-url: {{ .Values.secrets.clickhouseUrl | default "" | b64enc | quote }}
  minio-access-key: {{ .Values.secrets.minioAccessKey | default "" | b64enc | quote }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | default "" | b64enc | quote }}
  neo4j-password: {{ .Values.secrets.neo4jPassword | default "" | b64enc | quote }}
  elasticsearch-password: {{ .Values.secrets.elasticsearchPassword | default "" | b64enc | quote }}
---
{{- if .Values.ai.grok.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ai.grok.apiKeySecret }}
  namespace: {{ include "xilian.namespace" . }}
  labels:
    {{- include "xilian.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.ai.grok.apiKeySecretKey }}: {{ .Values.secrets.xaiApiKey | default "" | b64enc | quote }}
{{- end }}
